<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#0a0a0a"/>

  <!-- Clock face -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#3a1a1a" stroke-width="8"/>
  <circle cx="256" cy="256" r="190" fill="none" stroke="#2a1010" stroke-width="2"/>

  <!-- Major ticks -->
  <g stroke="#6b2020" stroke-width="6" stroke-linecap="round">
    <line x1="256" y1="66" x2="256" y2="96"/>
    <line x1="256" y1="416" x2="256" y2="446"/>
    <line x1="66" y1="256" x2="96" y2="256"/>
    <line x1="416" y1="256" x2="446" y2="256"/>
  </g>

  <!-- Minor ticks -->
  <g stroke="#3a1515" stroke-width="3" stroke-linecap="round">
    <line x1="352" y1="90" x2="338" y2="114"/>
    <line x1="422" y1="160" x2="398" y2="174"/>
    <line x1="422" y1="352" x2="398" y2="338"/>
    <line x1="352" y1="422" x2="338" y2="398"/>
    <line x1="160" y1="422" x2="174" y2="398"/>
    <line x1="90" y1="352" x2="114" y2="338"/>
    <line x1="90" y1="160" x2="114" y2="174"/>
    <line x1="160" y1="90" x2="174" y2="114"/>
  </g>

  <!-- Clock hand -->
  <g transform="rotate(-30, 256, 256)">
    <polygon points="256,80 248,256 264,256" fill="url(#handGrad)"/>
    <polygon points="256,68 248,88 256,80 264,88" fill="#e74c3c"/>
    <!-- Diamond decoration -->
    <polygon points="256,150 250,170 256,190 262,170" fill="rgba(192,57,43,0.6)" stroke="#d4a017" stroke-width="1" stroke-opacity="0.4"/>
    <!-- Counterweight -->
    <polygon points="248,256 252,290 256,296 260,290 264,256" fill="#3a1a1a"/>
  </g>

  <!-- Center ornament -->
  <circle cx="256" cy="256" r="18" fill="#2a1a0a" stroke="#d4a017" stroke-width="3" stroke-opacity="0.5"/>
  <circle cx="256" cy="256" r="10" fill="#c0392b"/>
  <circle cx="253" cy="253" r="3" fill="rgba(255,255,255,0.2)"/>

  <defs>
    <linearGradient id="handGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="50%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#4a1a1a"/>
    </linearGradient>
  </defs>
</svg>
